version: '3.8'

services:
  miyouqian:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: miyouqian
    restart: unless-stopped
    ports:
      - "5890:5890"
    volumes:
      # 配置文件（首次启动会自动生成，也可以从宿主机挂载）
      - ../config.yaml:/app/config.yaml
      # 登录凭证（敏感信息，必须持久化）
      - ../data:/app/data
      # 日志
      - ../logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
