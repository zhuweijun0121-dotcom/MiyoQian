version: '3.8'

services:
  miyoqian:
    # ── 方式一：从源码构建（适合开发者，改代码后 docker compose up --build） ──
    build:
      context: ..
      dockerfile: docker/Dockerfile

    # ── 方式二：直接拉预构建镜像（适合快速部署，无需构建过程） ──
    # image: zhu822560687/miyoqian:latest
    # 运行：docker compose pull && docker compose up

    container_name: miyoqian
    restart: unless-stopped
    ports:
      - "5890:5890"
    volumes:
      - ../config.yaml:/app/config.yaml   # 配置文件（首次启动会自动从 config.example.yaml 生成）
      - ../data:/app/data                  # 登录凭证（必须持久化）
      - ../logs:/app/logs                  # 日志
    environment:
      - TZ=Asia/Shanghai
